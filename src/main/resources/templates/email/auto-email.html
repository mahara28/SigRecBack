<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
</head>
<body style="margin:0; padding:0; font-family:Arial, sans-serif; background-color:#f4f6f9;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f9; padding:30px 0;">
        <tr>
            <td align="center">
                <table width="700" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 3px 12px rgba(0,0,0,0.08);">

                    <!-- Header -->
                    <tr>
                        <td style="background:#0d6efd; padding:30px; text-align:center; color:white;">
                            <h1 style="margin:0; font-size:26px;">Système de Notification</h1>
                            <p style="margin:10px 0 0; font-size:14px; opacity:0.95;">
                                Notification automatique
                            </p>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding:40px;">
                            <h2 style="color:#212529; margin-top:0; font-size:24px;">
                                {{title}}
                            </h2>

                            <p style="font-size:16px; color:#495057; line-height:1.8; margin-bottom:20px;">
                                Bonjour,
                            </p>

                            <p style="font-size:16px; color:#495057; line-height:1.8; margin-bottom:20px;">
                                {{message}}
                            </p>

                            <div style="margin-top:30px; padding:18px; background:#f8f9fa; border-left:5px solid #0d6efd; border-radius:6px;">
                                <p style="margin:0; font-size:15px; color:#343a40;">
                                    <strong>Expéditeur :</strong> {{senderName}}
                                </p>
                            </div>

                            <p style="margin-top:35px; font-size:15px; color:#6c757d; line-height:1.7;">
                                Merci de consulter votre espace ou votre système de suivi pour plus de détails si nécessaire.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background:#f1f3f5; padding:20px; text-align:center; font-size:13px; color:#6c757d;">
                            Cet email a été envoyé automatiquement. Merci de ne pas répondre directement à ce message.
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
